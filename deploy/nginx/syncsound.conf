server {
    listen 80;
    listen [::]:80;
    server_name xn--80a0aadt.su;
    client_max_body_size 64m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name xn--80a0aadt.su;
    client_max_body_size 64m;

    ssl_certificate /etc/letsencrypt/live/xn--80a0aadt.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80a0aadt.su/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SyncSoundSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /home/pe6e3/SyncSound/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /sound {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /socket-logger {
        return 301 /socket-logger/;
    }

    location /socket-logger/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:5080/;
    }
}
