name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/pe6e3/SyncSound
            git checkout main
            git pull --ff-only origin main
            mkdir -p backend/data
            if [ -f backend/data/version.json ] && [ ! -w backend/data/version.json ]; then
              docker run --rm -v "$PWD/backend/data:/data" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /data && chmod -R u+rwX /data"
            fi
            python3 - <<'PY'
            import json
            import re
            from pathlib import Path

            version_file = Path("backend/data/version.json")

            if version_file.exists():
                data = json.loads(version_file.read_text())
                version = str(data.get("version", "v1.0.0"))
            else:
                version = "v1.0.0"

            match = re.match(r"^v(\d+)\.(\d+)\.(\d+)$", version)
            if not match:
                major, minor, patch = 1, 0, 0
            else:
                major, minor, patch = map(int, match.groups())

            patch += 1
            next_version = f"v{major}.{minor}.{patch}"
            version_file.write_text(json.dumps({"version": next_version}))
            print(f"Deploy version: {next_version}")
            PY
            docker compose up --build -d
