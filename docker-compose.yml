services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syncsound-backend
    volumes:
      - ./backend/data:/app/data
    environment:
      - VERSION_FILE_PATH=/app/data/version.json
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: syncsound-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
